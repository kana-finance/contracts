name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip bot comments to avoid loops
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.comment.user.login, '[bot]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Auto-review every PR; also respond to @claude mentions in comments
          prompt: |
            Review this pull request for the Kana Finance yield aggregator contracts (Solidity/Foundry).

            Focus on:
            1. **Security** — reentrancy, access control, integer overflow/underflow, approval handling, CEI pattern violations, unchecked return values
            2. **ERC-4626 compliance** — correct share/asset accounting, virtual offset usage, rounding direction
            3. **Strategy interface** — correct IStrategy implementation, harvest(uint256[]) signature, balanceOf accuracy
            4. **Slippage protection** — minAmountsOut validated before swaps, maxSlippageBps ceiling respected
            5. **Invariants** — BPS splits sum to 10000, no more than 3 yield sources, cooldown timers enforced
            6. **Test coverage** — new functionality has corresponding tests in test/; edge cases and failure paths covered

            Post specific inline comments on the relevant lines. Flag any High or Medium severity issues clearly.
          claude_args: "--max-turns 5"

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true
